<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changing CSS</title>

    <style>
        .red {
            color: red;
        }

        .big {
            font-size: 40px;
        }

        .dark {
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>

    <h1 id="heading">Learning DOM CSS</h1>

    <button id="styleBtn">Change Style</button>
    <button id="addBtn">Add Class</button>
    <button id="removeBtn">Remove Class</button>
    <button id="toggleBtn">Toggle Dark Mode</button>

    <script src="script.js"></script>

</body>
</html>
